<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Carebed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center min-h-screen text-slate-900 dark:text-slate-200 m-0 p-4 font-sans transition-colors duration-500">

    <main class="w-full max-w-md p-8 bg-white dark:bg-[#0b1120] rounded-2xl shadow-sm dark:shadow-xl dark:shadow-black/20 border border-slate-200 dark:border-slate-800/80 transition-colors duration-500">

        <header class="text-center mb-8 flex flex-col items-center">
            <div class="flex items-center justify-center w-12 h-12 bg-teal-50 dark:bg-teal-900/30 rounded-full mb-4 border border-teal-100 dark:border-teal-800/50 shadow-sm transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6 text-teal-600 dark:text-teal-400">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM4 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 10.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight mb-1">Create an Account</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Register to access the Carebed system</p>
        </header>

        <form id="registerForm" class="space-y-4">

            <div>
                <label for="fullname" class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 dark:text-slate-500">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" id="fullname" name="fullname" placeholder="e.g. Jane Doe" required
                        pattern="[a-zA-Z\s]+" title="Only alphabetical characters and spaces are allowed."
                        class="w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 rounded-md text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:focus:ring-teal-500 focus:border-transparent transition-colors">
                </div>
            </div>

            <div>
                <label for="username" class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 dark:text-slate-500">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required
                        pattern="[a-zA-Z]+" title="Only alphabetical characters allowed."
                        class="w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 rounded-md text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:focus:ring-teal-500 focus:border-transparent transition-colors">
                </div>
                <p class="text-[11px] text-slate-400 dark:text-slate-500 mt-1">Letters only. No spaces or numbers.</p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 dark:text-slate-500">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    </div>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="8"
                        class="w-full pl-10 pr-10 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 rounded-md text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:focus:ring-teal-500 focus:border-transparent transition-colors">
                    
                    <button type="button" id="togglePasswordBtn" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none transition-colors">
                        <svg id="eyeIcon" class="w-5 h-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        <svg id="eyeSlashIcon" class="w-5 h-5 hidden pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 dark:text-slate-500">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                    </div>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required minlength="8"
                        class="w-full pl-10 pr-10 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 rounded-md text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:focus:ring-teal-500 focus:border-transparent transition-colors">
                    
                    <button type="button" id="toggleConfirmPasswordBtn" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none transition-colors">
                        <svg id="confirmEyeIcon" class="w-5 h-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        <svg id="confirmEyeSlashIcon" class="w-5 h-5 hidden pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                    </button>
                </div>
            </div>

            <div id="errorMessage"
                class="hidden text-rose-500 dark:text-rose-400 text-xs text-center p-2 bg-rose-50 dark:bg-rose-900/30 rounded border border-rose-100 dark:border-rose-800/50 transition-colors">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full mt-4 py-2.5 bg-slate-800 dark:bg-teal-600 text-white rounded-md text-sm font-medium hover:bg-slate-900 dark:hover:bg-teal-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md shadow-slate-900/10 dark:shadow-teal-900/30">
                Register Account
            </button>

            <div class="text-center mt-6 text-sm">
                <span class="text-slate-500 dark:text-slate-400">Already have an account?</span>
                <a href="login.html" class="text-teal-600 dark:text-teal-400 font-semibold hover:text-teal-700 dark:hover:text-teal-300 transition-colors ml-1">Sign
                    In instead</a>
            </div>
        </form>
    </main>

    <footer class="mt-8 text-center pb-4">
        <p class="text-xs text-slate-400 dark:text-slate-500 font-medium tracking-wide transition-colors">
            &copy; <span id="currentYear"></span> Carebed. All rights reserved.
        </p>
        <p class="text-[11px] text-slate-400/70 dark:text-slate-500 mt-1.5 uppercase tracking-wider transition-colors">
            Computer Engineering Thesis Project
        </p>
    </footer>

    <script src="assets/js/register.js"></script>
    <script>document.getElementById('currentYear').textContent = new Date().getFullYear();</script>
</body>

</html>
