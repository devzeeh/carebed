<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareBed Health Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CareBed Patient Dashboard</h1>

    <div class="dashboard-grid">
        <div class="card" style="border-top-color: #ff4c4c;">
            <div class="card-title">Heart Rate (BPM)</div>
            <div class="bpm-value" id="bpm-display">--</div>
            
            <div class="live-counter" id="live-count-display">Live Beats Detected: 0</div>
            
            <div id="status-display" class="status-text no-finger">Waiting for sensor...</div>
        </div>

        <div class="card" style="border-top-color: #4da6ff;">
            <div class="card-title">Raw IR Signal</div>
            <div class="ir-value" id="ir-display">--</div>
            <p style="color: #666; font-size: 0.9rem;">Must be > 50,000 to detect finger</p>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
